<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BEE 金库（测试网）</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#121212;color:#fff;font-family:Arial;padding:30px;max-width:500px;margin:0 auto}
    .title{text-align:center;color:#ffcc00;font-size:26px;margin-bottom:25px}
    .btn{width:100%;padding:16px;background:#ffcc00;color:#000;border:none;border-radius:12px;margin:10px 0;font-size:16px;font-weight:bold;cursor:pointer}
    .card{background:#1e1e1e;padding:22px;border-radius:14px;margin:15px 0}
    .card h3{color:#ffcc00;margin-bottom:10px}
    .amount{font-size:18px;margin:12px 0}
    .wallet{text-align:center;margin:10px 0;color:#aaa}
  </style>
</head>
<body>

  <div class="title">BEE 分红金库（测试网）</div>
  <button class="btn" id="connectBtn">连接钱包</button>
  <div class="wallet" id="wallet"></div>

  <div class="card">
    <h3>待领取 LP</h3>
    <div class="amount" id="lpAmount">--</div>
    <button class="btn" id="claimLP">领取 LP 分红</button>
  </div>

  <div class="card">
    <h3>待领取 BNB</h3>
    <div class="amount" id="bnbAmount">--</div>
    <button class="btn" id="claimBNB">领取 BNB 分红</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <script>
    // ==============================================
    // 👉 唯一改动：切换成 BSC 测试网配置
    // ==============================================
    const BSC_TESTNET_CHAIN_ID = "0x61"; // 97 in decimal
    const CONTRACT_ADDRESS = "0x55c4c48630A4C40f7A8fA736BFa5Ea62D9d07720"; // 👈 填你测试网合约
    const ABI = [
      "function claimVaultReward() external",
      "function balanceOf(address) view returns (uint256)",
      "function CLAIM_MIN_HOLD() view returns (uint256)"
    ];

    let provider, signer, contract, userAddress;

    document.getElementById("connectBtn").onclick = connect;
    document.getElementById("claimLP").onclick = claimLP;
    document.getElementById("claimBNB").onclick = claimBNB;

    async function switchToBSCTestnet() {
      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: BSC_TESTNET_CHAIN_ID }],
        });
      } catch (e) {
        alert("请切换到 BSC 测试网！");
      }
    }

    async function connect() {
      try {
        if (!window.ethereum) {
          alert("请安装 MetaMask");
          return;
        }

        await switchToBSCTestnet();

        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();
        contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

        document.getElementById("connectBtn").innerText = "已连接";
        document.getElementById("connectBtn").disabled = true;
        document.getElementById("wallet").innerText =
          userAddress.slice(0, 6) + "..." + userAddress.slice(-4);

        loadRewards();
      } catch (e) {
        alert("连接失败：" + e.message);
      }
    }

    async function loadRewards() {
      if (!contract) return;
      try {
        let balance = await contract.balanceOf(userAddress);
        document.getElementById("lpAmount").innerText = "已满足条件可领取";
        document.getElementById("bnbAmount").innerText = "自动分发中";
      } catch (e) {
        document.getElementById("lpAmount").innerText = "获取失败";
      }
    }

    async function claimLP() {
      if (!contract) return alert("请先连接钱包");
      try {
        let tx = await contract.claimVaultReward();
        await tx.wait();
        alert("✅ 领取成功！");
        loadRewards();
      } catch (e) {
        alert("❌ 失败：" + e.message);
      }
    }

    async function claimBNB() {
      alert("🔄 BNB 达到4U自动分发，无需手动领取");
    }
  </script>
</body>
</html>
